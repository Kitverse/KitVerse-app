<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>KitVerse</title>
<style>
  :root {
    --navy:#060b16; --card:#16224a; --line:#22305a; --blue:#1E6FFF; --blue-light:#7FB8FF;
    --ink:#e8edf7; --muted:#8896b3; --whatsapp:#25D366; --danger:#ff5050; --danger-light:#ff9d9d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--navy); }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--navy); color: #ffffff; position: relative; }

  .header { position: relative; padding: 28px 20px 20px; overflow: hidden;
    background: radial-gradient(120% 160% at 20% -10%, #14275c 0%, #060b16 60%); border-bottom: 1.5px solid rgba(255,255,255,.55); }
  .header::before { content:""; position:absolute; inset:0; pointer-events:none;
    background-image: repeating-linear-gradient(115deg, rgba(127,184,255,.05) 0 2px, transparent 2px 40px); }
  .logo-img { max-width: 78%; height: auto; display: block; position: relative; margin: 0 auto; }
  .subcount { font-size: 11px; color: #ffffff; margin-top: 10px; position: relative; text-align: center; }

  .content { padding: 16px 16px 90px; }
  .content.with-cart-bar { padding-bottom: 150px; }

  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-wrap svg { position: absolute; left: 12px; top: 12px; pointer-events: none; }
  .chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 2px; }
  .chip { flex-shrink: 0; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 700;
    border: 1.5px solid rgba(255,255,255,.55); background: rgba(255,255,255,.03); color: #ffffff; white-space: nowrap; cursor: pointer; }
  .chip.active { border-color: var(--blue-light); background: var(--blue); color: #fff; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .item-card { text-align: left; background: var(--card); border: 1.5px solid rgba(255,255,255,.55); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column; cursor: pointer; padding: 0; }
  .item-card .thumb { height: 130px; background: #0d1730; display: flex; align-items: center; justify-content: center; overflow: hidden;
    border-bottom: 1.5px solid rgba(255,255,255,.35); }
  .item-card .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .item-card .info { padding: 10px 12px; }
  .item-card .name { font-weight: 800; font-size: 14px; color: var(--blue); }
  .item-card .meta { font-size: 12px; color: #ffffff; margin-top: 2px; }
  .item-card .price { font-size: 13.5px; color: var(--blue); font-weight: 800; margin-top: 6px; }

  .empty-msg { text-align: center; color: #ffffff; font-size: 13.5px; margin-top: 60px; }

  .field { margin-bottom: 16px; }
  .field-label { font-size: 12px; font-weight: 700; color: #ffffff; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .text-input { width: 100%; background: #0d1730; border: 1.5px solid rgba(255,255,255,.55); border-radius: 10px;
    padding: 11px 12px; color: #ffffff; font-size: 14px; outline: none; }
  .text-input::placeholder { color: #ffffff; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { padding: 9px 14px; border-radius: 10px; font-size: 13.5px; font-weight: 700;
    border: 1.5px solid rgba(255,255,255,.55); background: rgba(255,255,255,.03); color: #ffffff; cursor: pointer; }
  .pill.active { border-color: var(--blue-light); background: var(--blue); color: #fff; }

  .btn { border: none; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:disabled { background: #2b3a63; color: #ffffff; cursor: default; }
  .btn-secondary { background: rgba(255,255,255,.05); border: 1px solid var(--line); color: #ffffff; }
  .btn-whatsapp { background: var(--whatsapp); color: #08331f; }
  .btn-whatsapp:disabled { background: #2b3a63; color: #ffffff; }
  .btn-danger-outline { background: rgba(255,80,80,.12); border: 1px solid rgba(255,80,80,.4); color: var(--danger-light); }

  .price-box { background: rgba(30,111,255,.14); border: 1.5px solid rgba(255,255,255,.55); border-radius: 12px; padding: 12px 14px; margin-top: 6px; }
  .price-box .row { display: flex; justify-content: space-between; align-items: center; }
  .price-box .label { font-size: 12px; color: #ffffff; font-weight: 700; text-transform: uppercase; }
  .price-box .value { font-size: 21px; font-weight: 800; color: var(--blue-light); }
  .price-box .note { font-size: 11px; color: #ffffff; margin-top: 6px; }

  .detail-overlay { position: fixed; inset: 0; background: var(--navy); z-index: 30; display: flex; flex-direction: column;
    max-width: 480px; margin: 0 auto; }
  .detail-topbar { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid #1a2748; }
  .detail-topbar button { background: none; border: none; color: #ffffff; cursor: pointer; padding: 0; display:flex; }
  .detail-title { font-weight: 800; font-size: 15px; }
  .detail-body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }
  .detail-photo { height: 220px; background: var(--card); border: 1.5px solid rgba(255,255,255,.55); border-radius: 16px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 18px; overflow: hidden; }
  .detail-photo img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .detail-meta { font-size: 13px; color: #ffffff; margin-bottom: 20px; }
  .sticky-bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; background: linear-gradient(0deg, var(--navy) 60%, transparent);
    max-width: 480px; margin: 0 auto; }
  .sticky-bottom .btn { width: 100%; font-size: 15px; padding: 14px; }
  .size-note-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .size-note-row span { font-size: 11.5px; color: #ffffff; }
  .size-note-row button { background: none; border: none; color: var(--blue-light); font-size: 12px; font-weight: 700; text-decoration: underline; cursor: pointer; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 60; display: flex; align-items: flex-end;
    max-width: 480px; margin: 0 auto; }
  .modal-sheet { background: var(--card); border: 1.5px solid rgba(255,255,255,.55); border-radius: 20px 20px 0 0; padding: 18px; width: 100%; max-height: 70vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-header button { background: none; border: none; color: #ffffff; cursor: pointer; }
  table.guide { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.guide th { text-align: left; padding: 8px 6px; color: var(--blue-light); border-bottom: 1px solid var(--line); white-space: nowrap; }
  table.guide td { padding: 8px 6px; border-bottom: 1px solid #1a2748; white-space: nowrap; }
  table.guide td.first { font-weight: 800; }

  .confirm-box { background: var(--card); border: 1.5px solid rgba(255,255,255,.55); border-radius: 16px; padding: 20px; max-width: 320px; }

  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
    background: #0a1220; border-top: 1.5px solid rgba(255,255,255,.55); display: flex; z-index: 20; }
  .nav-btn { flex: 1; padding: 12px 0 14px; background: none; border: none; color: #ffffff; display: flex;
    flex-direction: column; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; cursor: pointer; position: relative; }
  .nav-btn.active { color: var(--blue-light); }
  .cart-badge { position: absolute; top: -6px; right: -10px; background: var(--blue); color: #fff; font-size: 9.5px; font-weight: 800;
    border-radius: 999px; min-width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }

  .admin-gate { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 70vh; padding: 24px; text-align: center; }
  .admin-gate .hint { font-size: 12px; color: #ffffff; margin-bottom: 20px; }
  .admin-gate .hint b { color: var(--blue-light); }
  .admin-gate .box { width: 100%; max-width: 280px; }
  .error-msg { color: var(--danger-light); font-size: 12.5px; margin-top: 8px; }

  .photo-box { height: 160px; background: var(--card); border: 1.5px solid rgba(255,255,255,.55); border-radius: 14px;
    display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
  .photo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .photo-box .placeholder { text-align: center; color: #ffffff; }
  .upload-label { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--blue); border: none;
    border-radius: 10px; padding: 12px; color: #fff; font-size: 13.5px; font-weight: 700; cursor: pointer; }
  .upload-label input { width: 1px; height: 1px; opacity: 0; overflow: hidden; position: absolute; }
  .remove-photo-btn { margin-top: 8px; background: none; border: none; color: var(--danger-light); font-size: 12px; font-weight: 700; cursor: pointer; }

  .prenda-row { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1.5px solid rgba(255,255,255,.55);
    border-radius: 14px; padding: 10px; text-align: left; width: 100%; cursor: pointer; }
  .prenda-row .thumb { width: 50px; height: 50px; border-radius: 10px; background: #0d1730; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid rgba(255,255,255,.35); }
  .prenda-row .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .prenda-row .info { flex: 1; }
  .prenda-row .name { font-weight: 700; font-size: 14px; color: var(--blue); }
  .prenda-row .meta { font-size: 12px; color: #ffffff; }

  .cat-row { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1.5px solid rgba(255,255,255,.55);
    border-radius: 12px; padding: 12px 14px; }
  .cat-row span { font-weight: 700; font-size: 14px; }
  .cat-row svg { cursor: pointer; }

  .cart-line { background: var(--card); border: 1.5px solid rgba(255,255,255,.55); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
  .cart-line-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .cart-line-top .name { font-weight: 800; font-size: 14px; color: var(--blue); }
  .cart-line-top .meta { font-size: 12px; color: #ffffff; margin-top: 2px; }
  .cart-line svg { cursor: pointer; flex-shrink: 0; }
  .cart-line .detail { font-size: 12px; color: #ffffff; margin-top: 8px; line-height: 1.6; }
  .cart-line .price { font-size: 14px; font-weight: 800; color: var(--blue); margin-top: 6px; }
  .cart-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px; border-top: 1px solid #1a2748; margin-bottom: 18px; }
  .cart-total .lbl { font-size: 13px; color: #ffffff; font-weight: 700; }
  .cart-total .val { font-size: 22px; font-weight: 800; }
  .cart-note { font-size: 11.5px; color: #ffffff; margin-bottom: 16px; }

  .loading-spinner { position: fixed; inset: 0; background: rgba(6,11,22,.72); z-index: 999;
    display: flex; align-items: center; justify-content: center;
    max-width: 480px; margin: 0 auto; }
  .ball-spin { animation: ball-spin-anim .7s linear infinite; }
  @keyframes ball-spin-anim { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>

<div id="app"></div>
<div id="loading-spinner" class="loading-spinner" style="display:none;">

    <line x1="12" y1="6.6" x2="12" y2="2.4" stroke="#0a1220" stroke-width="1"/>

</div>

function loadCart() {
  try { const raw = localStorage.getItem(CART_KEY); return raw ? JSON.parse(raw) : []; } catch (e) { return []; }
}
function saveCart(c) { try { localStorage.setItem(CART_KEY, JSON.stringify(c)); } catch (e) {} }

function offlineWarning() {
  STATE.saveError = "Firebase no está configurado todavía (ver comentario FIREBASE en el código). Los cambios no se compartirán con tus amigos.";
  render();
}

function saveItemDoc(item) {
  if (!firebaseReady) { offlineWarning(); return; }
  itemsRef.doc(item.id).set(item).then(function () {
    STATE.saveError = null;
  }).catch(function (e) {
    STATE.saveError = "No se pudo guardar la camiseta: " + e.message;
    render();
  });
}
function deleteItemDoc(id) {
  if (!firebaseReady) { offlineWarning(); return; }
  itemsRef.doc(id).delete().catch(function (e) {
    STATE.saveError = "No se pudo eliminar: " + e.message;
    render();
  });
}
function saveMeta() {
  if (!firebaseReady) { offlineWarning(); return; }
  metaRef.set({ categories: DATA.categories, settings: DATA.settings }).then(function () {
    STATE.saveError = null;
  }).catch(function (e) {
    STATE.saveError = "No se pudo guardar: " + e.message;
    render();
  });
}
function persistCart() { saveCart(CART); }

/* ============ CLIENTE (registro único por dispositivo) ============ */
function loadCustomerProfile() {
  try { const raw = localStorage.getItem(CUSTOMER_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
}
function saveCustomerProfileLocal(profile) {
  try { localStorage.setItem(CUSTOMER_KEY, JSON.stringify(profile)); } catch (e) {}
}
function clearCustomerProfileLocal() {
  try { localStorage.removeItem(CUSTOMER_KEY); } catch (e) {}
}

function registerCustomer(nombre, telefono, direccion, onDone, onError) {
  if (!firebaseReady) {
    // Sin Firebase configurado: asigna un código local simple, solo para pruebas
    const profile = { code: "KV-LOCAL", nombre: nombre, telefono: telefono, direccion: direccion };
    saveCustomerProfileLocal(profile);
    onDone(profile);
    return;
  }
  db.runTransaction(function (tx) {
    return tx.get(counterRef).then(function (doc) {
      const current = (doc.exists && doc.data().customerSeq) ? doc.data().customerSeq : 0;
      const next = current + 1;
      tx.set(counterRef, { customerSeq: next }, { merge: true });
      return next;
    });
  }).then(function (seq) {
    const code = "KV-" + String(seq).padStart(4, "0");
    const profile = {
      code: code, nombre: nombre, telefono: telefono, direccion: direccion,
      createdAt: new Date().toISOString()
    };
    return customersRef.doc(code).set(profile).then(function () { return profile; });
  }).then(function (profile) {
    saveCustomerProfileLocal(profile);
    onDone(profile);
  }).catch(function (e) {
    if (onError) onError(e);
  });
}

function resizeImageToDataUrl(file, callback) {
  const maxW = 900, quality = 0.72;
  const reader = new FileReader();
  reader.onload = function() {
    const img = new Image();
    img.onload = function() {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      callback(null, canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = function() { callback(new Error("img")); };
    img.src = reader.result;
  };
  reader.onerror = function() { callback(new Error("read")); };
  reader.readAsDataURL(file);
}

function computeSurcharges(talla, nombre, dorsal, logoManga) {
  const list = [];
  if (SURCHARGE_SIZES.indexOf(talla) !== -1) list.push("Talla grande");
  if ((nombre||"").trim()) list.push("Nombre");
  if ((dorsal||"").trim()) list.push("Número");
  if ((logoManga||"").trim()) list.push("Logo manga");
  return list;
}

/* ============ RENDER: SHELL ============ */
function render() {
  const app = document.getElementById("app");
  if (!dataLoaded) {
    app.innerHTML = renderHeader() + '<div class="empty-msg" style="margin-top:80px;">Cargando catálogo...</div>';
    return;
  }
  let html = "";
  html += renderHeader();
  if (STATE.saveError) {
    html += '<div style="margin:0 16px 10px;background:rgba(255,80,80,.12);border:1px solid rgba(255,80,80,.4);color:#ff9d9d;font-size:12.5px;border-radius:10px;padding:8px 12px;">'+esc(STATE.saveError)+'</div>';
  }
  if (STATE.screen === "catalogo") html += renderCatalog();
  else if (STATE.screen === "cart") html += renderCart();
  else if (STATE.screen === "admin") html += renderAdmin();
  html += renderBottomNav();
  app.innerHTML = html;

  if (STATE.openItemId) {
    renderDetailOverlay();
  }
}

function renderBottomNav() {
  const cartCount = CART.length;
  return '<div class="bottom-nav">'
    + '<button class="nav-btn '+(STATE.screen==="catalogo"?"active":"")+'" data-action="nav" data-screen="catalogo">'+ICONS.layoutGrid+'<span>Catálogo</span></button>'
    + '<button class="nav-btn '+(STATE.screen==="cart"?"active":"")+'" data-action="nav" data-screen="cart"><span style="position:relative;display:inline-flex;">'+ICONS.shoppingCart+(cartCount>0?'<span class="cart-badge">'+cartCount+'</span>':'')+'</span><span>Carrito</span></button>'
    + '<button class="nav-btn '+(STATE.screen==="admin"?"active":"")+'" data-action="nav" data-screen="admin">'+ICONS.settings+'<span>Admin</span></button>'
    + '</div>';
}

/* ============ RENDER: CATÁLOGO ============ */
function filteredItems() {
  const q = STATE.catalogQuery.trim().toLowerCase();
  return DATA.items.filter(function(it) {
    const matchesCat = STATE.catalogCat === "Todos" || it.categoria === STATE.catalogCat;
    const matchesQ = !q || (it.equipo + " " + it.modelo).toLowerCase().indexOf(q) !== -1;
    return matchesCat && matchesQ;
  });
}

function renderCatalog() {
  let html = '<div class="content">';
  html += '<div class="search-wrap">' + ICONS.search + '<input class="text-input" style="padding-left:36px;" id="catalog-search-input" placeholder="Buscar equipo o modelo..." value="'+esc(STATE.catalogQuery)+'"/></div>';
  html += '<div class="chips" id="catalog-chips">';
  html += '<button class="chip '+(STATE.catalogCat==="Todos"?"active":"")+'" data-action="setCat" data-cat="Todos">Todos</button>';
  DATA.categories.forEach(function(c){
    html += '<button class="chip '+(STATE.catalogCat===c?"active":"")+'" data-action="setCat" data-cat="'+esc(c)+'">'+esc(c)+'</button>';
  });
  html += '</div>';
  html += '<div id="catalog-results">' + renderCatalogResults() + '</div>';
  html += '</div>';
  return html;
}

function renderCatalogResults() {
  const items = filteredItems();
  if (items.length === 0) {
    return '<div class="empty-msg">'+(DATA.items.length===0 ? "Todavía no hay camisetas en el catálogo." : "No hay resultados para esta búsqueda.")+'</div>';
  }
  let html = '<div class="grid">';
  items.forEach(function(it) {
    html += '<button class="item-card" data-action="openItem" data-id="'+esc(it.id)+'">'
      + '<div class="thumb">'+(it.foto ? '<img src="'+it.foto+'"/>' : ICONS.shirt(34,'#33436e'))+'</div>'
      + '<div class="info"><div class="name">'+esc(it.equipo||"Sin nombre")+'</div>'
      + '<div class="meta">'+esc(it.modelo||"")+(it.temporada?' · '+esc(it.temporada):'')+'</div>'
      + (it.precio ? '<div class="price">'+esc(it.precio)+'€</div>' : '')
      + '</div></button>';
  });
  html += '</div>';
  return html;
}

/* ============ RENDER: FICHA DE PRODUCTO (DetailView) ============ */
function openItem(id) {
  const item = findItem(id);
  if (!item) return;
  STATE.openItemId = id;
  STATE.detail = {
    talla: (item.tallas && item.tallas[0]) || "",
    version: (item.versiones && item.versiones[0]) || "",
    nombre: "", dorsal: "", logoManga: "",
    showGuide: false, added: false
  };
  render();
}
function closeItem() { STATE.openItemId = null; STATE.detail = null; render(); }

function renderDetailOverlay() {
  const item = findItem(STATE.openItemId);
  if (!item) { closeItem(); return; }
  const d = STATE.detail;

  let html = '<div class="detail-overlay" id="detail-overlay">';
  html += '<div class="detail-topbar"><button data-action="closeItem">'+ICONS.arrowLeft+'</button><div class="detail-title">'+esc(item.equipo)+'</div></div>';
  html += '<div class="detail-body">';
  html += '<div class="detail-photo">'+(item.foto ? '<img src="'+item.foto+'"/>' : ICONS.shirt(48,'#33436e'))+'</div>';
  html += '<div class="detail-meta">'+esc(item.modelo||"")+(item.temporada?' · '+esc(item.temporada):'')+'</div>';

  if (item.tallas && item.tallas.length) {
    html += '<div class="field"><div class="field-label">Talla</div><div class="pills">';
    item.tallas.forEach(function(t){ html += '<button class="pill '+(d.talla===t?"active":"")+'" data-action="setDetailField" data-field="talla" data-value="'+esc(t)+'">'+esc(t)+'</button>'; });
    html += '</div><div class="size-note-row"><span>XL, XXL, XXXL: +'+SURCHARGE_AMOUNT+'€</span><button data-action="showGuide">Ver guía de tallas</button></div></div>';
  }
  if (item.versiones && item.versiones.length) {
    html += '<div class="field"><div class="field-label">Versión</div><div class="pills">';
    item.versiones.forEach(function(v){ html += '<button class="pill '+(d.version===v?"active":"")+'" data-action="setDetailField" data-field="version" data-value="'+esc(v)+'">'+esc(v)+'</button>'; });
    html += '</div></div>';
  }

  html += '<div class="field"><div class="field-label">Nombre (deja en blanco para sin nombre · +'+SURCHARGE_AMOUNT+'€ si lo personalizas)</div>'
    + '<input class="text-input" placeholder="Ej. Larrubia" value="'+esc(d.nombre)+'" oninput="onDetailTextInput(this,\'nombre\')"/></div>';

  html += '<div class="field"><div class="field-label">Dorsal (deja en blanco para sin número · +'+SURCHARGE_AMOUNT+'€ si lo personalizas)</div>'
    + '<input class="text-input" inputmode="numeric" placeholder="Ej. 10" value="'+esc(d.dorsal)+'" oninput="onDetailDorsalInput(this)"/></div>';

  html += '<div class="field"><div class="field-label">Logos Manga (deja en blanco para sin logo manga · +'+SURCHARGE_AMOUNT+'€ si lo personalizas)</div>'
    + '<input class="text-input" placeholder="Ej. Champions, LaLiga" value="'+esc(d.logoManga)+'" oninput="onDetailTextInput(this,\'logoManga\')"/></div>';

  if (item.precio) {
    html += '<div id="detail-price-box">' + renderDetailPriceBox(item) + '</div>';
  }

  html += '</div>';

  html += '<div class="sticky-bottom"><button class="btn '+(d.added?'btn-secondary':'btn-primary')+'" data-action="addToCart">'
    + (d.added ? ICONS.check(19)+' Añadido al carrito' : ICONS.shoppingCart+' Añadir al carrito') + '</button></div>';

  html += '</div>';

  if (d.showGuide) {
    html += renderSizeGuideModal(item.publico || "Hombre");
  }

  document.getElementById("app").insertAdjacentHTML("beforeend", html);
}

function renderDetailPriceBox(item) {
  const d = STATE.detail;
  const basePrice = parseFloat(String(item.precio||"0").replace(",", ".")) || 0;
  const surcharges = computeSurcharges(d.talla, d.nombre, d.dorsal, d.logoManga);
  const finalPrice = basePrice + surcharges.length * SURCHARGE_AMOUNT;
  let html = '<div class="price-box"><div class="row"><span class="label">Precio</span><span class="value">'+finalPrice+'€</span></div>';
  if (surcharges.length > 0) {
    html += '<div class="note">Incluye suplemento de +'+SURCHARGE_AMOUNT+'€ por: '+esc(surcharges.join(", "))+'</div>';
  }
  html += '</div>';
  return html;
}

function renderSizeGuideModal(publico) {
  const guide = SIZE_GUIDES[publico] || SIZE_GUIDES["Hombre"];
  let html = '<div class="modal-overlay" data-action="closeGuide"><div class="modal-sheet" onclick="event.stopPropagation()">';
  html += '<div class="modal-header"><div style="font-weight:800;font-size:15px;">Guía de tallas · '+esc(publico)+'</div><button data-action="closeGuide">'+ICONS.x(20)+'</button></div>';
  html += '<div style="overflow-x:auto;"><table class="guide"><thead><tr>';
  guide.columns.forEach(function(c){ html += '<th>'+esc(c)+'</th>'; });
  html += '</tr></thead><tbody>';
  guide.rows.forEach(function(row){
    html += '<tr>';
    row.forEach(function(cell, j){ html += '<td class="'+(j===0?'first':'')+'">'+esc(cell)+'</td>'; });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  html += '<div style="font-size:11px;color:#ffffff;margin-top:12px;">Medidas orientativas. Si tienes dudas, consúltanos por WhatsApp.</div>';
  html += '</div></div>';
  return html;
}

function onDetailTextInput(el, field) {
  STATE.detail[field] = el.value;
  const box = document.getElementById("detail-price-box");
  if (box) box.innerHTML = renderDetailPriceBox(findItem(STATE.openItemId));
}
function onDetailDorsalInput(el) {
  el.value = el.value.replace(/[^\d]/g, "");
  STATE.detail.dorsal = el.value;
  const box = document.getElementById("detail-price-box");
  if (box) box.innerHTML = renderDetailPriceBox(findItem(STATE.openItemId));
}

function addToCart() {
  const item = findItem(STATE.openItemId);
  const d = STATE.detail;
  const basePrice = parseFloat(String(item.precio||"0").replace(",", ".")) || 0;
  const surcharges = computeSurcharges(d.talla, d.nombre, d.dorsal, d.logoManga);
  const finalPrice = basePrice + surcharges.length * SURCHARGE_AMOUNT;
  CART.push({
    lineId: uid(), itemId: item.id, equipo: item.equipo, modelo: item.modelo, temporada: item.temporada,
    talla: d.talla, version: d.version, nombre: d.nombre.trim(), dorsal: d.dorsal.trim(), logoManga: d.logoManga.trim(),
    escudo: item.escudo || "", precio: finalPrice
  });
  persistCart();
  STATE.detail.added = true;
  render();
  setTimeout(function(){ closeItem(); }, 700);
}

/* ============ RENDER: CARRITO ============ */
function buildOrderLine(l, idx) {
  const parts = [
    (idx+1)+") "+l.equipo+(l.modelo?" · "+l.modelo:"")+(l.temporada?" "+l.temporada:""),
    l.talla ? ("Talla: "+l.talla) : null,
    "Nombre: "+(l.nombre || "Sin nombre"),
    "Número: "+(l.dorsal || "Sin número"),
    l.version ? ("Versión: "+l.version) : null,
    "Logo manga: "+(l.logoManga || "Sin logo manga"),
    "Precio: "+l.precio+"€"
  ];
  return parts.filter(function(x){ return x; }).join("\n");
}
function buildFullOrderMessage() {
  const total = CART.reduce(function(sum,l){ return sum + (parseFloat(l.precio)||0); }, 0);
  const header = "Pedido KitVerse";
  const items = CART.map(buildOrderLine).join("\n\n");
  const totalLine = "Total: "+total+"€";
  const p = STATE.customerProfile || {};
  const contactLines = [
    "Datos de contacto:",
    "Cliente: " + (p.nombre || "-") + (p.code ? " (" + p.code + ")" : ""),
    "Teléfono: " + (p.telefono || "-"),
  ];
  if (p.direccion) contactLines.push("Dirección: " + p.direccion);
  return [header, items, totalLine, contactLines.join("\n")].join("\n\n");
}

function renderRegisterForm() {
  const f = STATE.regForm;
  let html = '<div class="content">';
  html += '<div class="empty-msg" style="margin-top:0;margin-bottom:18px;color:#ffffff;">Antes de tu primer pedido, déjanos tus datos. Solo se piden una vez.</div>';
  html += '<div class="field"><div class="field-label">Nombre y apellidos</div><input class="text-input" value="'+esc(f.nombre)+'" oninput="onRegInput(this,\'nombre\')" placeholder="Ej. Ana Pérez"/></div>';
  html += '<div class="field"><div class="field-label">Teléfono</div><input class="text-input" inputmode="tel" value="'+esc(f.telefono)+'" oninput="onRegInput(this,\'telefono\')" placeholder="Ej. 600111222"/></div>';
  html += '<div class="field"><div class="field-label">Dirección (opcional)</div><input class="text-input" value="'+esc(f.direccion)+'" oninput="onRegInput(this,\'direccion\')" placeholder="Calle, número, ciudad"/></div>';
  if (STATE.regError) html += '<div class="error-msg">'+esc(STATE.regError)+'</div>';
  const canReg = f.nombre.trim() && f.telefono.trim();
  html += '<button class="btn btn-primary" style="width:100%;padding:13px;margin-top:6px;" '+(canReg && !STATE.regSaving ? '' : 'disabled')+' data-action="submitRegister">'
    + (STATE.regSaving ? "Guardando..." : "Guardar y continuar") + '</button>';
  html += '</div>';
  return html;
}

function renderCart() {
  if (!STATE.customerProfile) {
    return renderRegisterForm();
  }
  if (CART.length === 0) {

  const total = CART.reduce(function(sum,l){ return sum + (parseFloat(l.precio)||0); }, 0);
  const p = STATE.customerProfile;
  let html = '<div class="content with-cart-bar">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1.5px solid rgba(255,255,255,.55);border-radius:12px;padding:10px 14px;margin-bottom:16px;">'
    + '<div><div style="font-weight:800;font-size:13.5px;">'+esc(p.nombre)+'</div><div style="font-size:11.5px;color:#ffffff;">'+esc(p.code||"")+' · '+esc(p.telefono||"")+'</div></div>'

    + '</div>';

      + '<div class="detail">Talla '+esc(l.talla)+' · '+esc(l.nombre||"Sin nombre")+' · '+esc(l.dorsal||"Sin número")+(l.logoManga?' · '+esc(l.logoManga):'')+'</div>'
      + '<div class="price">'+l.precio+'€</div>'
      + '</div>';

  html += '<div class="cart-total"><span class="lbl">TOTAL</span><span class="val">'+total+'€</span></div>';
  html += '<div class="cart-note">Pedido bajo encargo. Pago por adelantado (Bizum o efectivo). Entrega en 15-20 días.</div>';
  html += '</div>';

    + (STATE.cartSent ? ICONS.check(19)+' Pedido enviado' : ICONS.messageCircle+' Enviar pedido por WhatsApp') + '</button></div>';

function onRegInput(el, field) { STATE.regForm[field] = el.value; }

function submitRegister() {
  const f = STATE.regForm;
  if (!f.nombre.trim() || !f.telefono.trim()) return;
  STATE.regSaving = true; STATE.regError = null;
  render();
  registerCustomer(f.nombre.trim(), f.telefono.trim(), f.direccion.trim(), function (profile) {
    STATE.customerProfile = profile;
    STATE.regSaving = false;
    render();
  }, function (e) {
    STATE.regSaving = false;
    STATE.regError = "No se pudo registrar: " + e.message;
    render();
  });
}

function editProfile() {
  const p = STATE.customerProfile || {};
  STATE.regForm = { nombre: p.nombre || "", telefono: p.telefono || "", direccion: p.direccion || "" };
  STATE.customerProfile = null;
  render();
}

function sendOrder() {
  if (CART.length === 0 || !STATE.customerProfile) return;
  const text = encodeURIComponent(buildFullOrderMessage());
  const phone = (DATA.settings.whatsapp || "").replace(/[^\d]/g, "");
  const url = phone ? ("https://wa.me/"+phone+"?text="+text) : ("https://wa.me/?text="+text);
  window.open(url, "_blank");
  STATE.cartSent = true;
  render();
  setTimeout(function(){ CART = []; persistCart(); STATE.cartSent = false; render(); }, 1200);
}

  if (box) box.innerHTML = renderAdminPhotoBox();

/* ============ EVENTOS (delegación única) ============ */
document.addEventListener("click", function(e) {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.getAttribute("data-action");
  if (action === "nav") { withSpinner(function(){ STATE.screen = el.getAttribute("data-screen"); render(); }); }
  else if (action === "setCat") {
    STATE.catalogCat = el.getAttribute("data-cat");
    let chipsHtml = '<button class="chip '+(STATE.catalogCat==="Todos"?"active":"")+'" data-action="setCat" data-cat="Todos">Todos</button>';
    DATA.categories.forEach(function(c){ chipsHtml += '<button class="chip '+(STATE.catalogCat===c?"active":"")+'" data-action="setCat" data-cat="'+esc(c)+'">'+esc(c)+'</button>'; });
    document.getElementById("catalog-chips").innerHTML = chipsHtml;
    document.getElementById("catalog-results").innerHTML = renderCatalogResults();
  }
  else if (action === "openItem") { const id = el.getAttribute("data-id"); withSpinner(function(){ openItem(id); }); }
  else if (action === "closeItem") { withSpinner(function(){ closeItem(); }); }
  else if (action === "setDetailField") { STATE.detail[el.getAttribute("data-field")] = el.getAttribute("data-value"); render(); }
  else if (action === "showGuide") { STATE.detail.showGuide = true; render(); }
  else if (action === "closeGuide") { STATE.detail.showGuide = false; render(); }
  else if (action === "addToCart") addToCart();
  else if (action === "removeLine") { CART = CART.filter(function(l){ return l.lineId !== el.getAttribute("data-id"); }); persistCart(); render(); }
  else if (action === "sendOrder") sendOrder();
  else if (action === "submitRegister") submitRegister();
  else if (action === "editProfile") editProfile();
  else if (action === "adminTab") {
    STATE.adminTab = el.getAttribute("data-tab");
    render();
    if (STATE.adminTab === "clientes") loadCustomersList();
  }
  else if (action === "refreshClientes") loadCustomersList();
  else if (action === "submitAdminPass") submitAdminPass();
  else if (action === "newItem") { withSpinner(function(){ newItem(); }); }
  else if (action === "editItem") { const id = el.getAttribute("data-id"); withSpinner(function(){ editItem(id); }); }
  else if (action === "cancelItemForm") { withSpinner(function(){ cancelItemForm(); }); }
  else if (action === "saveItemForm") saveItemForm();
  else if (action === "requestDeleteItem") requestDeleteItem(el.getAttribute("data-id"));
  else if (action === "cancelDelete") cancelDelete();
  else if (action === "confirmDelete") confirmDelete();
  else if (action === "removePhoto") removePhoto();
  else if (action === "adminSetField") adminSetField(el.getAttribute("data-field"), el.getAttribute("data-value"));
  else if (action === "adminSetPublico") adminSetPublico(el.getAttribute("data-value"));
  else if (action === "adminToggleTalla") adminToggleTalla(el.getAttribute("data-value"));
  else if (action === "adminToggleVersion") adminToggleVersion(el.getAttribute("data-value"));
  else if (action === "addCategory") addCategory();
  else if (action === "removeCategory") removeCategory(el.getAttribute("data-value"));
  else if (action === "saveSettings") saveSettings();
});

document.addEventListener("input", function(e) {
  if (e.target && e.target.id === "catalog-search-input") {
    STATE.catalogQuery = e.target.value;
    document.getElementById("catalog-results").innerHTML = renderCatalogResults();
  }
});

/* ============ INICIO ============ */
function bootstrap() {
  if (!firebaseReady) {
    DATA = emptyData();
    dataLoaded = true;
    STATE.saveError = "Firebase no está configurado. Esto es una vista de PRUEBA local: tus amigos no verán estos cambios hasta que completes la configuración (ver comentario FIREBASE en el código).";
    render();
    return;
  }

  let itemsLoaded = false, metaLoaded = false;
  function maybeFirstRender() {
    if (itemsLoaded && metaLoaded && !dataLoaded) {
      dataLoaded = true;
      render();
    } else if (dataLoaded) {
      render();
    }
  }

  itemsRef.get().then(function (snap) {
    if (snap.empty) {
      // Primera vez: sembramos el catálogo de ejemplo, un documento por camiseta
      const batch = db.batch();
      DEMO_ITEMS.forEach(function (it) { batch.set(itemsRef.doc(it.id), it); });
      batch.commit();
      DATA.items = DEMO_ITEMS.slice();
    } else {
      DATA.items = snap.docs.map(function (d) { return d.data(); });
    }
    itemsLoaded = true;
    maybeFirstRender();

    itemsRef.onSnapshot(function (snap2) {
      DATA.items = snap2.docs.map(function (d) { return d.data(); });
      maybeFirstRender();
    });
  }).catch(function (e) {
    itemsLoaded = true;
    STATE.saveError = "No se pudo conectar con Firebase (camisetas): " + e.message;
    maybeFirstRender();
  });

  metaRef.get().then(function (doc) {
    if (doc.exists) {
      const d = doc.data();
      DATA.categories = d.categories || DEFAULT_CATEGORIES.slice();
      DATA.settings = d.settings || { whatsapp: "", adminPass: "kitverse" };
    } else {
      DATA.categories = DEFAULT_CATEGORIES.slice();
      DATA.settings = { whatsapp: "", adminPass: "kitverse" };
      metaRef.set({ categories: DATA.categories, settings: DATA.settings });
    }
    metaLoaded = true;
    maybeFirstRender();

    metaRef.onSnapshot(function (doc2) {
      if (doc2.exists) {
        const d = doc2.data();
        DATA.categories = d.categories || DATA.categories;
        DATA.settings = d.settings || DATA.settings;
        maybeFirstRender();
      }
    });
  }).catch(function (e) {
    metaLoaded = true;
    STATE.saveError = "No se pudo conectar con Firebase (ajustes): " + e.message;
    maybeFirstRender();
  });
}

bootstrap();
</script>
</body>
</html>
